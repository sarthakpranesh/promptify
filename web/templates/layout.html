{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{template "title" .}} — Promptify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        html {
            font-size: 75%;
        }
        @media (min-width: 1024px) {
            html {
                font-size: 100%;
            }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen font-sans text-base leading-relaxed">
    <div class="sticky top-0 z-40">
        <nav class="bg-white border-b border-gray-200">
            <div class="max-w-4xl mx-auto px-6 py-5 flex items-center justify-between">
                <a href="/dashboard" class="inline-flex items-center gap-2 text-xl font-bold tracking-tight text-indigo-600">
                    <span>Promptify</span>
                    <span class="inline-flex items-center rounded-full bg-amber-100 px-2 py-0.5 text-xs font-semibold uppercase tracking-wide text-amber-800">Beta</span>
                </a>
                {{if .CurrentUser.DisplayName}}
                <div class="relative">
                    <button
                        id="account-menu-button"
                        type="button"
                        class="inline-flex items-center gap-2 rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275" />
                        </svg>
                        <span class="max-w-[14rem] truncate">{{.CurrentUser.DisplayName}}</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div
                        id="account-menu"
                        class="hidden absolute right-0 mt-2 w-44 rounded-lg border border-gray-200 bg-white py-1 shadow-lg z-50"
                    >
                        <a href="/settings" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Settings</a>
                        {{if .CurrentUser.IsAdmin}}
                        <a href="/server" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Server</a>
                        {{end}}
                        <a href="/logout" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Logout</a>
                    </div>
                </div>
                {{end}}
            </div>
        </nav>
        <div class="border-b border-amber-200 bg-amber-50">
            <div class="max-w-4xl mx-auto px-6 py-2.5 text-sm text-amber-900">
                Promptify is in beta. Features and behavior may change as we improve the product.
            </div>
        </div>
    </div>
    <main class="max-w-4xl mx-auto px-6 py-12">
        {{template "content" .}}
    </main>
    <script>
        (function () {
            const button = document.getElementById('account-menu-button');
            const menu = document.getElementById('account-menu');
            if (!button || !menu) return;

            button.addEventListener('click', function (event) {
                event.stopPropagation();
                menu.classList.toggle('hidden');
            });

            document.addEventListener('click', function (event) {
                if (!menu.contains(event.target) && !button.contains(event.target)) {
                    menu.classList.add('hidden');
                }
            });
        })();
    </script>
</body>
</html>
{{end}}
